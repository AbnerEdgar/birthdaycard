<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>生日快乐，Kiki！</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Noto+Serif+SC:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
  :root {
    --cream:#FDF6EE; --dusty:#C9897A; --deep:#3D2B2B; --gold:#C9A96E; --sage:#8FAF8C;
    --env:#e8d5b8;
  }

  body {
    background:var(--cream);
    min-height:100vh;
    display:flex; align-items:center; justify-content:center;
    font-family:'Noto Serif SC','Cormorant Garamond',serif;
    overflow:hidden;
    position:relative;
  }

  /* ── Background petals ── */
  .bg-canvas { position:fixed; inset:0; pointer-events:none; z-index:0; overflow:hidden; }
  .petal { position:absolute; border-radius:50% 0 50% 0; opacity:0; animation:floatPetal linear infinite; }
  @keyframes floatPetal {
    0%  { transform:translateY(110vh) rotate(0deg); opacity:0; }
    10% { opacity:.4; } 90% { opacity:.25; }
    100%{ transform:translateY(-20vh) rotate(720deg); opacity:0; }
  }

  /* ════════════════════════════
     ENVELOPE SCENE
  ════════════════════════════ */
  #envelope-scene {
    position:fixed; inset:0; z-index:100;
    display:flex; align-items:center; justify-content:center;
    background:var(--cream);
    transition:opacity .6s ease;
  }
  #envelope-scene.hide {
    opacity:0;
    pointer-events:none;
  }

  .envelope {
    position:relative;
    width:min(380px, 85vw);
    cursor:pointer;
    filter:drop-shadow(0 12px 40px rgba(61,43,43,.18));
  }

  /* Envelope body */
  .env-body {
    position:relative;
    width:100%;
    padding-top:65%; /* ~landscape ratio */
    border-radius:4px;
    overflow:visible;
  }

  /* Back of envelope */
  .env-back {
    position:absolute; inset:0;
    background:linear-gradient(160deg, #e8d5b8 0%, #dfc9a5 100%);
    border-radius:4px;
    box-shadow: inset 0 0 0 1px rgba(201,169,110,.4);
  }

  /* Bottom flap (triangle pointing up from bottom) */
  .env-flap-bottom {
    position:absolute; bottom:0; left:0; right:0;
    height:55%;
    overflow:hidden;
    z-index:1;
  }
  .env-flap-bottom::after {
    content:'';
    position:absolute; bottom:0; left:0; right:0;
    height:100%;
    background:linear-gradient(170deg, #dfc5a0 0%, #d4b88a 100%);
    clip-path:polygon(0% 100%, 50% 0%, 100% 100%);
  }

  /* Left flap */
  .env-flap-left {
    position:absolute; top:0; left:0; bottom:0;
    width:51%;
    overflow:hidden;
    z-index:2;
  }
  .env-flap-left::after {
    content:'';
    position:absolute; inset:0;
    background:linear-gradient(120deg, #e2c99e 0%, #d8be93 100%);
    clip-path:polygon(0% 0%, 100% 50%, 0% 100%);
  }

  /* Right flap */
  .env-flap-right {
    position:absolute; top:0; right:0; bottom:0;
    width:51%;
    overflow:hidden;
    z-index:2;
  }
  .env-flap-right::after {
    content:'';
    position:absolute; inset:0;
    background:linear-gradient(240deg, #dfc49b 0%, #d4b98e 100%);
    clip-path:polygon(100% 0%, 0% 50%, 100% 100%);
  }

  /* Top flap — this one opens */
  .env-flap-top {
    position:absolute; top:0; left:0; right:0;
    height:55%;
    transform-origin:top center;
    transform:rotateX(0deg);
    z-index:10;
    overflow:hidden;
    transition:transform .7s cubic-bezier(.4,0,.2,1);
  }
  .env-flap-top::after {
    content:'';
    position:absolute; top:0; left:0; right:0;
    height:100%;
    background:linear-gradient(190deg, #ead6b2 0%, #dfc9a0 100%);
    clip-path:polygon(0% 0%, 50% 100%, 100% 0%);
    box-shadow: inset 0 -2px 8px rgba(0,0,0,.08);
  }
  .env-flap-top.open {
    transform:rotateX(-180deg);
  }

  /* Wax seal */
  .seal {
    position:absolute;
    top:50%; left:50%;
    transform:translate(-50%, -50%);
    width:44px; height:44px;
    background:radial-gradient(circle at 40% 35%, #c9897a, #a0503a);
    border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    font-size:18px;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    z-index:15;
    transition:opacity .3s ease, transform .3s ease;
  }
  .seal.break {
    opacity:0;
    transform:translate(-50%,-50%) scale(1.4);
  }

  /* Letter peeking out */
  .letter-peek {
    position:absolute;
    bottom:100%; left:5%; right:5%;
    height:70%;
    background:linear-gradient(160deg, #fffaf4, #fdf2e8);
    border-radius:3px 3px 0 0;
    transform:translateY(100%);
    transition:transform .8s cubic-bezier(.22,1,.36,1);
    z-index:5;
    box-shadow:0 -4px 20px rgba(61,43,43,.1);
    display:flex; align-items:center; justify-content:center;
    overflow:hidden;
  }
  .letter-peek.rise {
    transform:translateY(20%);
  }
  .letter-peek-inner {
    font-family:'Noto Serif SC',serif;
    font-size:13px; color:#8a6a5a;
    text-align:center; line-height:1.8;
    opacity:0; transition:opacity .4s ease .4s;
  }
  .letter-peek.rise .letter-peek-inner {
    opacity:1;
  }

  /* Tap hint */
  .tap-hint {
    position:absolute;
    bottom:-40px; left:0; right:0;
    text-align:center;
    font-family:'Cormorant Garamond',serif;
    font-size:13px; color:#b08a78; letter-spacing:.08em;
    font-style:italic;
    animation:hintPulse 2s ease-in-out infinite;
  }
  @keyframes hintPulse {
    0%,100% { opacity:.6; transform:translateY(0); }
    50% { opacity:1; transform:translateY(-3px); }
  }

  /* ════════════════════════════
     CARD (hidden initially)
  ════════════════════════════ */
  #card-wrapper {
    padding:48px 24px;
    width:100%;
    display:flex; justify-content:center;
    opacity:0;
    transform:scale(.94) translateY(20px);
    transition:opacity .8s ease, transform .8s cubic-bezier(.22,1,.36,1);
    pointer-events:none;
  }
  #card-wrapper.show {
    opacity:1;
    transform:scale(1) translateY(0);
    pointer-events:auto;
  }

  .card {
    position:relative; z-index:10;
    width:min(980px, 100%);
    background:linear-gradient(145deg,#fffaf4 0%,#fdf2e8 40%,#f8eee2 100%);
    border-radius:6px;
    overflow:hidden;
    box-shadow:0 4px 8px rgba(61,43,43,.05), 0 12px 32px rgba(61,43,43,.1),
               0 40px 100px rgba(61,43,43,.13), inset 0 0 0 1px rgba(201,169,110,.22);
  }
  .card::before, .card::after {
    content:''; position:absolute; width:56px; height:56px;
    border-color:var(--gold); border-style:solid; opacity:.35; z-index:3; pointer-events:none;
  }
  .card::before { top:16px; left:16px; border-width:1px 0 0 1px; }
  .card::after  { bottom:16px; right:16px; border-width:0 1px 1px 0; }

  .layout {
    display:grid;
    grid-template-columns: 1.1fr 1fr;
    align-items: stretch;
  }

  .art-side {
    display:grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: auto auto auto;
    align-self: start;
    background:#111;
    gap:3px;
    overflow:hidden;
  }
  .a1 { grid-column:1/-1; grid-row:1; overflow:hidden; }
  .a1 img { width:100%; aspect-ratio:16/6; object-fit:cover; object-position:center 40%; display:block; }
  .a2 { grid-column:1; grid-row:2; overflow:hidden; }
  .a2 img { width:100%; aspect-ratio:4/3; object-fit:cover; object-position:center top; display:block; }
  .a3 { grid-column:2; grid-row:2; overflow:hidden; }
  .a3 img { width:100%; aspect-ratio:4/3; object-fit:cover; object-position:center top; display:block; }
  .a4 { grid-column:1/-1; grid-row:3; overflow:hidden; }
  .a4 img { width:100%; aspect-ratio:16/5; object-fit:cover; object-position:center 20%; display:block; }

  .text-side {
    padding:44px 44px 44px 38px;
    display:flex; flex-direction:column; justify-content:flex-start;
  }

  .orn { display:flex; align-items:center; gap:10px; margin-bottom:22px; animation:fadeUp .8s .2s both; }
  .orn .line { flex:1; height:1px; }
  .orn .line-l { background:linear-gradient(to right, transparent, var(--gold)); }
  .orn .line-r { background:linear-gradient(to left, transparent, var(--gold)); }
  .orn .dot { width:5px; height:5px; background:var(--gold); border-radius:50%; flex-shrink:0; }

  .badge {
    display:inline-block; font-family:'Noto Serif SC',serif;
    font-size:9.5px; font-weight:700; letter-spacing:.2em;
    color:var(--dusty); background:rgba(201,137,122,.08);
    border:1px solid rgba(201,137,122,.25);
    padding:4px 12px; border-radius:2px; margin-bottom:16px; width:fit-content;
    animation:fadeUp .8s .3s both;
  }
  h1 {
    font-family:'Noto Serif SC','Playfair Display',serif;
    font-size:clamp(30px,3.4vw,48px);
    font-weight:700; color:var(--deep); line-height:1.15; margin-bottom:6px;
    animation:fadeUp .8s .38s both;
  }
  h1 em { font-style:italic; color:var(--dusty); font-family:'Playfair Display',serif; }
  .sub { font-size:13.5px; color:var(--gold); letter-spacing:.1em; margin-bottom:20px; animation:fadeUp .8s .46s both; }
  .divrow { display:flex; align-items:center; gap:10px; margin-bottom:16px; animation:fadeUp .8s .52s both; }
  .divrow .rule { flex:1; height:1px; background:rgba(143,175,140,.4); }
  .msg { font-size:14px; line-height:1.95; color:#5a4040; font-weight:300; animation:fadeUp .8s .6s both; }
  .msg p+p { margin-top:9px; }
  .msg .hi { color:var(--dusty); font-weight:400; }
  .orn-bot { margin-top:20px; display:flex; align-items:center; gap:12px; animation:fadeUp .8s .7s both; }
  .orn-bot .line { flex:1; height:1px; background:linear-gradient(to right,transparent,rgba(201,169,110,.3),transparent); }
  .orn-bot .yr { font-size:10px; letter-spacing:.18em; color:var(--gold); white-space:nowrap; }
  .panda-row { margin-top:18px; display:flex; align-items:center; gap:10px; animation:fadeUp .8s .8s both; }
  .panda-caption { font-size:12.5px; color:#8a6a5a; line-height:1.6; }

  .floaters { position:absolute; inset:0; pointer-events:none; overflow:hidden; border-radius:6px; }
  .floater { position:absolute; font-size:17px; animation:floatUp ease-in-out infinite; opacity:0; }
  @keyframes floatUp {
    0%  { opacity:0; transform:translateY(0) scale(.8); }
    20% { opacity:.8; } 80% { opacity:.6; }
    100%{ opacity:0; transform:translateY(-150px) scale(1.1); }
  }
  @keyframes fadeUp { from { opacity:0; transform:translateY(14px); } to { opacity:1; transform:translateY(0); } }

  .confetti-piece {
    position:fixed; z-index:200; pointer-events:none;
    border-radius:2px; opacity:1;
  }

  @media (max-width:680px) {
    #card-wrapper { padding:20px 12px; }
    .layout { grid-template-columns:1fr; }
    .text-side { padding:32px 24px 28px; }
  }
</style>
</head>
<body>
<div class="bg-canvas" id="bgCanvas"></div>

<!-- ══ ENVELOPE SCENE ══ -->
<div id="envelope-scene">
  <div class="envelope" id="envelope" onclick="openEnvelope()">
    <div class="env-body">
      <div class="env-back"></div>
      <div class="env-flap-bottom"></div>
      <div class="env-flap-left"></div>
      <div class="env-flap-right"></div>

      <!-- Letter peeking out (behind top flap) -->
      <div class="letter-peek" id="letterPeek">
        <div class="letter-peek-inner">
          生日快乐<br>
          <span style="font-size:11px;color:#c9897a;font-style:italic">Kiki ✨</span>
        </div>
      </div>

      <div class="env-flap-top" id="envFlapTop"></div>
      <div class="seal" id="seal">🌸</div>
    </div>
    <div class="tap-hint" id="tapHint">轻触打开 ✦ tap to open</div>
  </div>
</div>

<!-- ══ CARD ══ -->

<script>
  // ── Background petals ──
  const bgCanvas = document.getElementById('bgCanvas');
  const pc = ['#e8c5b0','#d4e4d2','#c9897a','#c9a96e','#8faf8c','#f5ddd3'];
  for (let i=0;i<22;i++) {
    const p=document.createElement('div'); p.className='petal';
    const s=8+Math.random()*15;
    p.style.cssText=`width:${s}px;height:${s}px;left:${Math.random()*100}%;background:${pc[Math.floor(Math.random()*pc.length)]};animation-duration:${10+Math.random()*14}s;animation-delay:${Math.random()*12}s;`;
    bgCanvas.appendChild(p);
  }

  // ── Envelope open sequence ──
  let opened = false;
  function openEnvelope() {
    if (opened) return;
    opened = true;

    document.getElementById('tapHint').style.opacity = '0';

    // Step 1: break seal
    const seal = document.getElementById('seal');
    seal.classList.add('break');

    // Step 2: flap opens (fold back)
    setTimeout(() => {
      document.getElementById('envFlapTop').classList.add('open');
    }, 300);

    // Step 3: letter rises
    setTimeout(() => {
      document.getElementById('letterPeek').classList.add('rise');
    }, 900);

    // Step 4: whole envelope zooms/fades out, card fades in
    setTimeout(() => {
      const scene = document.getElementById('envelope-scene');
      scene.style.transition = 'opacity .7s ease, transform .7s ease';
      scene.style.transform = 'scale(1.08)';
      scene.style.opacity = '0';
      scene.style.pointerEvents = 'none';

      // Body becomes scrollable
      document.body.style.overflow = 'auto';

      // Show card
      const wrapper = document.getElementById('card-wrapper');
      wrapper.classList.add('show');

      // Scroll to top smoothly
      window.scrollTo({ top:0, behavior:'smooth' });

      // Mobile: scroll to heading
      if (window.innerWidth < 768) {
        setTimeout(() => {
          document.getElementById('birthday-heading')?.scrollIntoView({ behavior:'smooth', block:'center' });
        }, 600);
      }
    }, 1800);

    // Step 5: confetti after card appears
    setTimeout(() => {
      launchConfetti();
      scene.style.display = 'none';
    }, 2600);
  }

  // ── Floaters ──
  const fl = document.getElementById('floaters');
  const fe = []; //['🎉','🌸','✨','🍀','💛','🎊','🌷','⭐'];
  for (let i=0;i<8;i++) {
    const f=document.createElement('div'); f.className='floater';
    f.textContent=fe[Math.floor(Math.random()*fe.length)];
    f.style.cssText=`left:${5+Math.random()*90}%;bottom:-5%;animation-duration:${4+Math.random()*5}s;animation-delay:${1.5+Math.random()*9}s;`;
    fl.appendChild(f);
  }

  // ── Confetti ──
  const cc = ['#E8C5B0','#8FAF8C','#C9897A','#C9A96E','#D4E4D2','#f5c6d0','#ffd700'];
  function launchConfetti() {
    for (let i=0;i<100;i++) {
      const c = document.createElement('div');
      c.className = 'confetti-piece';
      const size = 5+Math.random()*8;
      const isCircle = Math.random() > .5;
      const x = Math.random()*100;
      const dur = 2.2+Math.random()*2;
      const delay = Math.random()*1;
      const drift = (Math.random()-.5)*400;
      c.style.cssText = `left:${x}vw;top:-10px;width:${size}px;height:${isCircle?size:size*.5}px;background:${cc[Math.floor(Math.random()*cc.length)]};border-radius:${isCircle?'50%':'2px'};`;
      document.body.appendChild(c);
      const startTime = performance.now() + delay*1000;
      const totalDur = dur*1000;
      function animate(now) {
        const elapsed = now - startTime;
        if (elapsed < 0) { requestAnimationFrame(animate); return; }
        const p = Math.min(elapsed/totalDur, 1);
        c.style.transform = `translate(${drift*p}px, ${p*(window.innerHeight+60)}px) rotate(${p*720}deg)`;
        c.style.opacity = p > .8 ? 1-(p-.8)/.2 : 1;
        if (p < 1) requestAnimationFrame(animate);
        else c.remove();
      }
      requestAnimationFrame(animate);
    }
  }
</script>
</body>
</html>
